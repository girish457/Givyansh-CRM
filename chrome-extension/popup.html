<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast RMS AI Sourcing Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="brand">
        <div class="logo-glow"></div>
        <span class="logo-text">FAST <span class="accent-text">RMS</span></span>
        <span class="badge">AI Companion</span>
      </div>
      <div class="status-container" id="statusContainer">
        <span class="status-dot pulsing-red" id="statusDot"></span>
        <span class="status-text" id="statusText">Connecting...</span>
      </div>
    </header>

    <!-- Controls Panel -->
    <div class="control-panel">
      <div class="filter-group">
        <label for="recruiterSelect">Recruiter</label>
        <select id="recruiterSelect" class="styled-select">
          <option value="all">All Recruiters</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="dateSelect">Data Range</label>
        <select id="dateSelect" class="styled-select">
          <option value="today" selected>Today's Entries</option>
          <option value="all">All Available</option>
        </select>
      </div>
    </div>

    <!-- Tab Navigation -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="sourcing">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        Sourcing
      </button>
      <button class="tab-btn" data-tab="grid">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line></svg>
        Interview Grid
      </button>
      <button class="tab-btn" data-tab="kpi">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        KPI Metrics
      </button>
    </nav>

    <!-- Preview Box Area -->
    <main class="preview-area">
      <div class="textarea-header">
        <span class="preview-label">Live AI Report Preview</span>
        <div class="tone-control">
          <span class="tone-label">Format:</span>
          <button class="tone-btn active" data-format="professional">Formal</button>
          <button class="tone-btn" data-format="markdown">Markdown</button>
        </div>
      </div>
      <div class="textarea-container">
        <textarea id="reportPreview" readonly placeholder="Waiting for CRM connection and pipeline compile..."></textarea>
        <div class="loader-overlay" id="loaderOverlay">
          <div class="spinner"></div>
          <p>Compiling database & crafting report...</p>
        </div>
      </div>
    </main>

    <!-- Footer Actions -->
    <footer class="app-footer">
      <button class="action-btn btn-secondary" id="refreshBtn" title="Sync live data from CRM">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
        Sync
      </button>
      <button class="action-btn btn-primary ripple" id="copyBtn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        Copy Report
      </button>
      <button class="action-btn btn-accent ripple" id="injectBtn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        Inject Into Email
      </button>
    </footer>

    <!-- Custom success toast -->
    <div class="toast-notification" id="toast">
      <span class="toast-icon">✓</span>
      <span class="toast-message" id="toastMessage">Copied to clipboard!</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
